<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Practices Library - CommAI</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .library-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .library-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .library-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            max-width: 600px;
            margin: 30px auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border-radius: 25px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: var(--text-color);
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .category-tab {
            padding: 12px 24px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .category-tab:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .category-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .practice-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .practice-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .practice-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .practice-card .category-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            background: rgba(102, 126, 234, 0.2);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .practice-card p {
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .practice-card .tips-list {
            list-style: none;
            padding: 0;
        }

        .practice-card .tips-list li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .practice-card .tips-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        .case-study-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #667eea;
        }

        .case-study-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .case-study-section {
            margin: 15px 0;
        }

        .case-study-section h4 {
            color: #764ba2;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .dos-donts-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
        }

        .dos-donts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .dos-section, .donts-section {
            padding: 15px;
            border-radius: 10px;
        }

        .dos-section {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4caf50;
        }

        .donts-section {
            background: rgba(244, 67, 54, 0.1);
            border-left: 3px solid #f44336;
        }

        .dos-section h4 {
            color: #4caf50;
        }

        .donts-section h4 {
            color: #f44336;
        }

        .industry-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border-top: 4px solid #667eea;
        }

        .industry-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .industry-card .style-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            background: rgba(118, 75, 162, 0.2);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 25px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 500;
        }

        .back-button:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .dos-donts-grid {
                grid-template-columns: 1fr;
            }

            .library-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to App</a>

    <div class="library-container">
        <div class="library-header">
            <h1>📚 Best Practices Library</h1>
            <p>Expert guidance on professional email communication</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search best practices...">
        </div>

        <div style="text-align: center; margin: 30px 0;">
            <a href="quiz.html" class="quiz-button" style="display: inline-block; padding: 18px 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 30px; color: white; text-decoration: none; font-weight: 700; font-size: 1.1rem; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); transition: all 0.3s ease;">
                📝 Take Email Etiquette Quiz
            </a>
        </div>

        <style>
            .quiz-button:hover {
                transform: translateY(-3px) scale(1.05);
                box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6) !important;
            }
        </style>

        <div class="category-tabs">
            <div class="category-tab active" data-category="all">All</div>
            <div class="category-tab" data-category="email_etiquette">Email Etiquette</div>
            <div class="category-tab" data-category="case_studies">Case Studies</div>
            <div class="category-tab" data-category="dos_donts">Do's & Don'ts</div>
            <div class="category-tab" data-category="industry_guides">Industry Guides</div>
            <div class="category-tab" data-category="quick_tips">Quick Tips</div>
        </div>

        <div id="contentArea" class="content-grid"></div>
    </div>

    <script>
        let allData = null;
        let currentCategory = 'all';

        // Load all practices on page load
        async function loadPractices() {
            try {
                const response = await fetch('/api/best-practices');
                const result = await response.json();
                
                if (result.success) {
                    allData = result.data;
                    displayContent(currentCategory);
                }
            } catch (error) {
                console.error('Error loading practices:', error);
                document.getElementById('contentArea').innerHTML = 
                    '<div class="no-results">Failed to load best practices. Please try again.</div>';
            }
        }

        // Display content based on category
        function displayContent(category) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '';

            if (!allData) return;

            if (category === 'all') {
                // Display all categories
                displayEmailEtiquette(allData.email_etiquette);
                displayCaseStudies(allData.case_studies);
                displayDosAndDonts(allData.dos_donts);
                displayIndustryGuides(allData.industry_guides);
                displayQuickTips(allData.quick_tips);
            } else if (category === 'email_etiquette') {
                displayEmailEtiquette(allData.email_etiquette);
            } else if (category === 'case_studies') {
                displayCaseStudies(allData.case_studies);
            } else if (category === 'dos_donts') {
                displayDosAndDonts(allData.dos_donts);
            } else if (category === 'industry_guides') {
                displayIndustryGuides(allData.industry_guides);
            } else if (category === 'quick_tips') {
                displayQuickTips(allData.quick_tips);
            }
        }

        // Display email etiquette cards
        function displayEmailEtiquette(items) {
            const contentArea = document.getElementById('contentArea');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'practice-card';
                card.innerHTML = `
                    <div class="category-badge">${item.category}</div>
                    <h3>${item.title}</h3>
                    <p>${item.content}</p>
                    ${item.tips ? `
                        <ul class="tips-list">
                            ${item.tips.map(tip => `<li>${tip}</li>`).join('')}
                        </ul>
                    ` : ''}
                `;
                contentArea.appendChild(card);
            });
        }

        // Display case studies
        function displayCaseStudies(items) {
            const contentArea = document.getElementById('contentArea');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'case-study-card';
                card.innerHTML = `
                    <div class="category-badge">${item.category}</div>
                    <h3>${item.title}</h3>
                    
                    <div class="case-study-section">
                        <h4>📋 Scenario</h4>
                        <p>${item.scenario}</p>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>⚠️ Problem</h4>
                        <p>${item.problem}</p>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>✅ Solution</h4>
                        <p>${item.solution}</p>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>📈 Outcome</h4>
                        <p>${item.outcome}</p>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>💡 Lesson</h4>
                        <p><strong>${item.lesson}</strong></p>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Display do's and don'ts
        function displayDosAndDonts(items) {
            const contentArea = document.getElementById('contentArea');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'dos-donts-card';
                card.innerHTML = `
                    <div class="category-badge">${item.category}</div>
                    <h3>${item.topic}</h3>
                    
                    <div class="dos-donts-grid">
                        <div class="dos-section">
                            <h4>✓ Do's</h4>
                            <ul class="tips-list">
                                ${item.dos.map(d => `<li>${d}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="donts-section">
                            <h4>✗ Don'ts</h4>
                            <ul class="tips-list">
                                ${item.donts.map(d => `<li>${d}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Display industry guides
        function displayIndustryGuides(items) {
            const contentArea = document.getElementById('contentArea');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'industry-card';
                card.innerHTML = `
                    <div class="category-badge">${item.category}</div>
                    <h3>${item.industry}</h3>
                    <div class="style-badge">${item.communication_style}</div>
                    
                    <div class="case-study-section">
                        <h4>Key Practices</h4>
                        <ul class="tips-list">
                            ${item.key_practices.map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>Common Mistakes</h4>
                        <ul class="tips-list">
                            ${item.common_mistakes.map(m => `<li>${m}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="case-study-section">
                        <h4>Example Subject Line</h4>
                        <p><em>"${item.example_subject}"</em></p>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Display quick tips
        function displayQuickTips(items) {
            const contentArea = document.getElementById('contentArea');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'practice-card';
                card.style.textAlign = 'center';
                card.innerHTML = `
                    <div style="font-size: 3rem; margin-bottom: 15px;">${item.icon}</div>
                    <h3>${item.title}</h3>
                    <p style="font-size: 1.1rem; font-weight: 500;">${item.tip}</p>
                `;
                contentArea.appendChild(card);
            });
        }

        // Category tab switching
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                displayContent(currentCategory);
            });
        });

        // Search functionality
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                displayContent(currentCategory);
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/best-practices/search?q=${encodeURIComponent(query)}`);
                    const result = await response.json();
                    
                    if (result.success && result.results.length > 0) {
                        displaySearchResults(result.results);
                    } else {
                        document.getElementById('contentArea').innerHTML = 
                            '<div class="no-results">No results found. Try different keywords.</div>';
                    }
                } catch (error) {
                    console.error('Search error:', error);
                }
            }, 300);
        });

        // Display search results
        function displaySearchResults(results) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '';
            
            results.forEach(item => {
                const category = item.source_category;
                
                if (category === 'email_etiquette') {
                    displayEmailEtiquette([item]);
                } else if (category === 'case_studies') {
                    displayCaseStudies([item]);
                } else if (category === 'dos_donts') {
                    displayDosAndDonts([item]);
                } else if (category === 'industry_guides') {
                    displayIndustryGuides([item]);
                } else if (category === 'quick_tips') {
                    displayQuickTips([item]);
                }
            });
        }

        // Load practices on page load
        loadPractices();
    </script>
</body>
</html>
