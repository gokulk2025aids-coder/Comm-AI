<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Analyser - Login</title>
    <link rel="stylesheet" href="/static/login.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hidden theme toggle to prevent JS errors since it expects this element -->
    <button class="theme-toggle" id="theme-toggle" style="display: none;">
        <span class="theme-icon">🌙</span>
    </button>

    <div class="top-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="brand-icon">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        <span>Email Analyser</span>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Left Panel -->
            <div class="card-left">
                <div class="illustration">
                    <svg width="240" height="200" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Decorative Elements -->
                        <circle cx="20" cy="100" r="2" fill="#CBD5E0"/>
                        <circle cx="220" cy="80" r="2" fill="#CBD5E0"/>
                        <circle cx="180" cy="30" r="2" fill="#CBD5E0"/>
                        <circle cx="40" cy="160" r="2" fill="#CBD5E0"/>
                        <path d="M30 40 h6 M33 37 v6" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round"/>
                        <path d="M200 150 h6 M203 147 v6" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round"/>
                        
                        <!-- Envelope Back -->
                        <path d="M40 70 h160 v80 h-160 z" fill="#E2E8F0" stroke="#1A202C" stroke-width="2" stroke-linejoin="round"/>
                        
                        <!-- Paper Content -->
                        <path d="M60 30 h120 v100 h-120 z" fill="#FFFFFF" stroke="#1A202C" stroke-width="2" stroke-linejoin="round"/>
                        
                        <!-- Chart on Paper -->
                        <path d="M80 90 l20 -20 l20 15 l20 -30 l20 10" fill="none" stroke="#1A202C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="80" cy="90" r="3" fill="#1A202C"/>
                        <circle cx="100" cy="70" r="3" fill="#1A202C"/>
                        <circle cx="120" cy="85" r="3" fill="#1A202C"/>
                        <circle cx="140" cy="55" r="3" fill="#1A202C"/>
                        <circle cx="160" cy="65" r="3" fill="#1A202C"/>
                        
                        <!-- Envelope Front Flaps -->
                        <path d="M40 70 l80 50 l80 -50" fill="#E2E8F0" stroke="#1A202C" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M40 150 l60 -40" fill="none" stroke="#1A202C" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M200 150 l-60 -40" fill="none" stroke="#1A202C" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>Email Analyser -<br>Understand Your Inbox</h2>
            </div>

            <!-- Right Panel -->
            <div class="card-right">
                <h2 class="welcome-heading">Welcome Back</h2>
                
                <div class="form-container">
                    <!-- Password Form (Default active) -->
                    <form id="password-form" class="form active">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="login-password" placeholder="Password" required>
                                <button type="button" class="eye-icon toggle-password" aria-label="Toggle Password Visibility">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                        <line x1="1" y1="1" x2="23" y2="23"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Sign In</span>
                            <span class="btn-loader"></span>
                        </button>
                        
                        <button type="button" class="btn btn-outline tab" data-tab="signup">
                            Sign Up
                        </button>
                        
                        <div class="forgot-pwd">
                            <a href="#">Forgot Password?</a>
                        </div>
                        
                        <button type="button" class="btn btn-social">
                            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Sign in with Google
                        </button>
                        
                        <div class="social-mini-icons">
                            <div class="s-icon"><span style="color: #4285F4; font-weight: 700;">G</span></div>
                            <div class="s-icon"><span style="color: #3182CE; font-weight: 700;">A</span></div>
                            <div class="s-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="#1A202C"><path d="M11 11H0V0h11v11zm13 0H13V0h11v11zM11 24H0V13h11v11zm13 0H13V13h11v11z"/></svg>
                            </div>
                        </div>

                        <!-- Fallback toggle to ensure OTP users can still login without modifying existing functionality -->
                        <div class="forgot-pwd" style="margin-top: 15px;">
                            <a href="#" class="tab" data-tab="otp">Use OTP Login instead</a>
                        </div>
                    </form>

                    <!-- Signup Form -->
                    <form id="signup-form" class="form">
                        <div class="form-group">
                            <label for="signup-email">Email Address</label>
                            <input type="email" id="signup-email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" placeholder="Password" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-confirm">Confirm Password</label>
                            <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Sign Up</span>
                            <span class="btn-loader"></span>
                        </button>
                        <button type="button" class="btn btn-outline tab" data-tab="password">
                            Back to Sign In
                        </button>
                    </form>

                    <!-- OTP Form -->
                    <form id="otp-form" class="form">
                        <div class="form-group">
                            <label for="otp-email">Email Address</label>
                            <input type="email" id="otp-email" placeholder="Email Address" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Send OTP</span>
                            <span class="btn-loader"></span>
                        </button>
                        <button type="button" class="btn btn-outline tab" data-tab="password">
                            Back to Password Login
                        </button>
                    </form>

                    <!-- OTP Verify Form -->
                    <form id="otp-verify-form" class="form" style="display: none;">
                        <div class="form-group">
                            <label for="otp-code">Enter OTP</label>
                            <input type="text" id="otp-code" placeholder="6-digit code" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Verify OTP</span>
                            <span class="btn-loader"></span>
                        </button>
                        <button type="button" class="btn btn-outline" id="back-to-email">
                            Back
                        </button>
                    </form>

                    <div class="message" id="message"></div>
                </div>
            </div>
        </div>
        
        <div class="footer-links">
            <a href="#" id="link-about">About</a>
            <a href="#" id="link-privacy">Privacy</a>
            <a href="#" id="link-terms">Terms</a>
        </div>
    </div>
    
    <!-- Info Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                Content
            </div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                } else {
                    input.type = 'password';
                    this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                }
            });
        });
    </script>
    <script src="/static/login.js?v=2"></script>
</body>
</html>
