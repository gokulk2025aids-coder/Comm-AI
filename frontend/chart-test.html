<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Test</title>
    <script src="/static/chart.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .chart-container {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        canvas {
            max-width: 100%;
            height: 400px !important;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #22c55e;
            color: white;
        }
        .error {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chart.js Diagnostic Test</h1>
        <div id="status"></div>
        
        <div class="chart-container">
            <h3>Test Chart</h3>
            <canvas id="testChart"></canvas>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        
        // Check if Chart.js is loaded
        if (typeof Chart === 'undefined') {
            statusDiv.innerHTML = '<div class="status error">❌ Chart.js is NOT loaded!</div>';
            console.error('Chart.js not loaded');
        } else {
            statusDiv.innerHTML = '<div class="status success">✅ Chart.js is loaded! Version: ' + Chart.version + '</div>';
            console.log('Chart.js loaded successfully, version:', Chart.version);
            
            // Try to create a test chart
            try {
                const ctx = document.getElementById('testChart').getContext('2d');
                const testChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple'],
                        datasets: [{
                            label: 'Test Data',
                            data: [12, 19, 3, 5, 2],
                            backgroundColor: [
                                'rgba(255, 99, 132, 0.8)',
                                'rgba(54, 162, 235, 0.8)',
                                'rgba(255, 206, 86, 0.8)',
                                'rgba(75, 192, 192, 0.8)',
                                'rgba(153, 102, 255, 0.8)'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#ffffff' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            x: {
                                ticks: { color: '#ffffff' },
                                grid: { display: false }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#ffffff' }
                            }
                        }
                    }
                });
                
                statusDiv.innerHTML += '<div class="status success">✅ Test chart created successfully!</div>';
                console.log('Test chart created:', testChart);
            } catch (error) {
                statusDiv.innerHTML += '<div class="status error">❌ Error creating chart: ' + error.message + '</div>';
                console.error('Chart creation error:', error);
            }
        }
    </script>
</body>
</html>
